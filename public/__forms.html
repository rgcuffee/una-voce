<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Una Voce Forms</title>
</head>

<body>
    <form name="contact" method="POST" action="/contact-success/" data-netlify="true" netlify data-netlify-honeypot="bot-field" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact" />
        <p>
            <label>Do not fill this out: <input name="bot-field" /></label>
        </p>
        <p>
            <label>Name <input name="name" type="text" /></label>
        </p>
        <p>
            <label>Email <input name="email" type="email" /></label>
        </p>
        <p>
            <label>
                Reason
                <select name="reason">
                    <option value="general">General note</option>
                    <option value="partner">Partner or community listing</option>
                    <option value="content">Content suggestion</option>
                    <option value="support">Prayer support or access issue</option>
                </select>
            </label>
        </p>
        <p>
            <label>Message <textarea name="message"></textarea></label>
        </p>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
