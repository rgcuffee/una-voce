<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1C1C1E" />
    <meta name="robots" content="noindex" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <title>Message Sent - Una Voce</title>
    <style>
        :root {
            --gold: #b8973a;
            --gold-dim: #f5edd6;
            --charcoal: #1c1c1e;
            --charcoal-mid: #3a3a3c;
            --border: #e0ddd5;
            --off-white: #fafaf8;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #e9e6df;
            color: var(--charcoal);
            font-family: Inter, sans-serif;
            line-height: 1.5;
            padding: 24px;
        }

        main {
            width: min(100%, 520px);
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }

        .mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold-dim);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 18px;
        }

        h1 {
            font-family: "Cormorant Garamond", serif;
            font-size: 34px;
            font-weight: 300;
            line-height: 1.05;
            margin-bottom: 12px;
        }

        p {
            color: var(--charcoal-mid);
            font-size: 15px;
            margin-bottom: 20px;
        }

        a {
            color: var(--gold);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>
        <div class="mark">✓</div>
        <h1>Your message has been sent</h1>
        <p>Thank you for reaching out. We will read your note carefully and reply when a response is needed.</p>
        <a href="/contact">Return to contact</a>
    </main>
</body>

</html>
