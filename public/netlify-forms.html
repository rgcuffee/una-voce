<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Una Voce Forms</title>
</head>

<body>
    <form name="contact" method="POST" action="/success.html" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact" />

        <div>
            <label>
                Do not fill this out if you are human:
                <input name="bot-field" />
            </label>
        </div>

        <div>
            <label>
                Name
                <input name="name" type="text" required />
            </label>
        </div>

        <div>
            <label>
                Email
                <input name="email" type="email" required />
            </label>
        </div>

        <div>
            <label>
                Reason
                <select name="reason" required>
                    <option value="general">General note</option>
                    <option value="partner">Partner or community listing</option>
                    <option value="content">Content suggestion</option>
                    <option value="support">Prayer support or access issue</option>
                </select>
            </label>
        </div>

        <div>
            <label>
                Message
                <textarea name="message" required></textarea>
            </label>
        </div>

        <button type="submit">Submit</button>
    </form>
</body>

</html>
