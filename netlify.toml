# example netlify.toml
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"

[functions."youtube-ingest-scheduled"]
  schedule = "*/30 * * * *"

[functions."spotify-ingest-scheduled"]
  schedule = "*/30 * * * *"

[functions."apple-podcast-ingest-scheduled"]
  schedule = "*/30 * * * *"

[[redirects]]
  from = "/api/analytics"
  to = "/.netlify/functions/analytics"
  status = 200

[[redirects]]
  from = "/api/youtube-ingest"
  to = "/.netlify/functions/youtube-ingest"
  status = 200

[[redirects]]
  from = "/api/spotify-ingest"
  to = "/.netlify/functions/spotify-ingest"
  status = 200

[[redirects]]
  from = "/api/apple-podcast-ingest"
  to = "/.netlify/functions/apple-podcast-ingest"
  status = 200

[[redirects]]
  from = "/api/admin/partners"
  to = "/.netlify/functions/admin-partners"
  status = 200

[[redirects]]
  from = "/src/*"
  to = "http://localhost:5173/src/:splat"
  status = 200

[[redirects]]
  from = "/@vite/client"
  to = "http://localhost:5173/@vite/client"
  status = 200

[[redirects]]
  from = "/@vite/*"
  to = "http://localhost:5173/@vite/:splat"
  status = 200

[[redirects]]
  from = "/@react-refresh"
  to = "http://localhost:5173/@react-refresh"
  status = 200

[[redirects]]
  from = "/node_modules/.vite/*"
  to = "http://localhost:5173/node_modules/.vite/:splat"
  status = 200

[[redirects]]
  from = "/node_modules/vite/*"
  to = "http://localhost:5173/node_modules/vite/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

  ## more info on configuring this file: https://ntl.fyi/file-based-build-config
