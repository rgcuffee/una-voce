<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1C1C1E" />
    <meta name="description" content="Pray the Liturgy of the Hours with communities around the world." />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <title>Una Voce – The Church at Prayer</title>
</head>

<body>
    <form name="contact" method="POST" action="/success.html" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="contact" />
        <input name="bot-field" />
        <input name="name" type="text" />
        <input name="email" type="email" />
        <select name="reason">
            <option value="general">General note</option>
            <option value="partner">Partner or community listing</option>
            <option value="content">Content suggestion</option>
            <option value="support">Prayer support or access issue</option>
        </select>
        <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
